mode: rule

rules:
  # 局域网
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  # 国内/区域直连
  - GEOSITE,google-cn,DIRECT
  - GEOSITE,apple-cn,DIRECT
  - GEOSITE,category-games@cn,DIRECT
  - GEOSITE,steam@cn,DIRECT
  # 业务代理
  - GEOSITE,category-ai-!cn,AI
  - GEOSITE,github,github
  - GEOSITE,steam,steam
  - GEOSITE,apple,apple
  - GEOSITE,google,谷歌服务
  - GEOIP,google,谷歌服务,no-resolve
  # 兜底
  - GEOSITE,gfw,手动选择
  - GEOSITE,cn,DIRECT
  - GEOIP,cn,DIRECT,no-resolve
  - MATCH,漏网之鱼

proxy-groups:
  - name: 手动选择
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 韩国节点
      - 日本节点
  - name: AI
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 日本节点
      - 韩国节点
  - name: steam
    type: select
    proxies:
      - 全球直连
      - 香港节点
      - 美国节点
      - 韩国节点
      - 日本节点
  - name: github
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 韩国节点
      - 日本节点
  - name: apple
    type: select
    proxies:
      - 全球直连
      - 香港节点
      - 美国节点
      - 韩国节点
      - 日本节点
  - name: 谷歌服务
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 韩国节点
      - 日本节点
  - name: 漏网之鱼
    type: select
    proxies:
      - 全球直连
      - 香港节点
      - 美国节点
      - 韩国节点
      - 日本节点
  - name: 香港节点
    type: url-test
    include-all-proxies: true
    filter: '^香港\s'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 美国节点
    type: url-test
    include-all-proxies: true
    filter: '^美国\s'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 韩国节点
    type: url-test
    include-all-proxies: true
    filter: '^韩国\s'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 日本节点
    type: url-test
    include-all-proxies: true
    filter: '^日本\s'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 全球直连
    type: select
    proxies:
      - DIRECT
